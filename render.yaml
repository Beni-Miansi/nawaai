services:
  - type: web
    name: nexaai
    runtime: node
    plan: free
    buildCommand: npm ci --only=production
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
