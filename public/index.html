<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaAI — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="auth-body">

    <div class="auth-split">

      <!-- Panneau gauche : branding -->
      <div class="auth-brand">
        <div class="brand-content">
          <div class="brand-logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
              <rect width="40" height="40" rx="12" fill="url(#g1)"/>
              <path d="M20 8L28 14V26L20 32L12 26V14L20 8Z" stroke="white" stroke-width="1.5" fill="none"/>
              <circle cx="20" cy="20" r="4" fill="white"/>
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40">
                  <stop offset="0%" stop-color="#6366f1"/>
                  <stop offset="100%" stop-color="#06b6d4"/>
                </linearGradient>
              </defs>
            </svg>
            <span>NexaAI</span>
          </div>
          <h1 class="brand-headline">Votre assistant<br/>intelligent personnel</h1>
          <p class="brand-sub">Posez des questions, obtenez des réponses précises. Codez, traduisez, rédigez — tout en un.</p>
          <div class="brand-features">
            <div class="feature-pill">💻 Aide au code</div>
            <div class="feature-pill">🌍 Traduction</div>
            <div class="feature-pill">📝 Rédaction</div>
            <div class="feature-pill">🔢 Maths</div>
          </div>
        </div>
      </div>

      <!-- Panneau droit : formulaire -->
      <div class="auth-form-panel">
        <div class="auth-form-inner">
          <div class="auth-form-header">
            <h2>Bon retour</h2>
            <p>Connectez-vous pour accéder à votre espace</p>
          </div>

          <form id="loginForm" novalidate>
            <div class="form-field">
              <label for="loginEmail">Adresse email</label>
              <input id="loginEmail" type="email" placeholder="votre@email.com" autocomplete="email" />
              <span class="field-error" id="loginEmailErr"></span>
            </div>
            <div class="form-field">
              <label for="loginPassword">Mot de passe</label>
              <div class="password-wrap">
                <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
                <button type="button" class="toggle-pwd" data-target="loginPassword">
                  <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <span class="field-error" id="loginPasswordErr"></span>
            </div>

            <div id="loginError" class="form-alert" hidden></div>

            <button type="submit" class="btn-submit" id="loginBtn">
              <span class="btn-text">Se connecter</span>
              <span class="btn-spinner" hidden>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4"/>
                </svg>
              </span>
            </button>
          </form>

          <p class="auth-redirect">
            Pas encore de compte ?
            <a href="/register.html" class="link-btn">Créer un compte</a>
          </p>
        </div>
      </div>

    </div>

    <script src="./login.js"></script>
  </body>
</html>
